name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release-check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Check version vs tags
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "Tag v$VERSION already exists, skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v$VERSION not found, will trigger release."
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build-macos:
    needs: release-check
    if: needs.release-check.outputs.should_release == 'true'
    runs-on: macos-latest
    environment: release
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - run: npm install

      - run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

  build-windows:
    needs: release-check
    if: needs.release-check.outputs.should_release == 'true'
    runs-on: windows-latest
    environment: release
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - run: npm install

      - run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/msi/*.msi.zip.sig

  release:
    needs: [release-check, build-macos, build-windows]
    if: always() && (needs.build-macos.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate latest.json
        run: |
          VERSION=${{ needs.release-check.outputs.version }}
          REPO="https://github.com/Murphycx94/clipboard-x"
          BASE_URL="$REPO/releases/download/v$VERSION"

          MAC_TAR=$(find artifacts/macos-build -name "*.app.tar.gz" 2>/dev/null | head -1)
          MAC_SIG=$(find artifacts/macos-build -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
          WIN_EXE=$(find artifacts/windows-build -name "*-setup.exe" 2>/dev/null | head -1)
          WIN_SIG=$(find artifacts/windows-build -name "*.exe.sig" 2>/dev/null | head -1)

          node -e "
            const fs = require('fs');
            const platforms = {};
            const macTar = '$MAC_TAR';
            const macSig = '$MAC_SIG';
            const winExe = '$WIN_EXE';
            const winSig = '$WIN_SIG';
            const baseUrl = '$BASE_URL';

            if (macTar && macSig && fs.existsSync(macTar) && fs.existsSync(macSig)) {
              const sig = fs.readFileSync(macSig, 'utf-8').trim();
              const filename = macTar.split('/').pop();
              platforms['darwin-aarch64'] = { signature: sig, url: baseUrl + '/' + filename };
              platforms['darwin-x86_64'] = { signature: sig, url: baseUrl + '/' + filename };
            }
            if (winExe && winSig && fs.existsSync(winExe) && fs.existsSync(winSig)) {
              const sig = fs.readFileSync(winSig, 'utf-8').trim();
              const filename = winExe.split('/').pop();
              platforms['windows-x86_64'] = { signature: sig, url: baseUrl + '/' + filename };
            }
            const out = { version: 'v$VERSION', notes: '', pub_date: new Date().toISOString(), platforms };
            fs.writeFileSync('latest.json', JSON.stringify(out, null, 2));
            console.log('Generated latest.json:', JSON.stringify(out, null, 2));
          "

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.release-check.outputs.version }}"
          name: "v${{ needs.release-check.outputs.version }}"
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            artifacts/macos-build/**
            artifacts/windows-build/**
            latest.json
