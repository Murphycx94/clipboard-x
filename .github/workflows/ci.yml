name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release-check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Check version vs tags
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "Tag v$VERSION already exists, skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v$VERSION not found, will trigger release."
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build-macos:
    needs: release-check
    if: needs.release-check.outputs.should_release == 'true'
    runs-on: macos-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - run: npm install

      - run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    needs: release-check
    if: needs.release-check.outputs.should_release == 'true'
    runs-on: windows-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - run: npm install

      - run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: [build-macos, build-windows]
    if: always() && (needs.build-macos.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.release-check.outputs.version }}"
          name: "v${{ needs.release-check.outputs.version }}"
          draft: false
          generate_release_notes: true
          files: |
            artifacts/macos-build/**
            artifacts/windows-build/**
