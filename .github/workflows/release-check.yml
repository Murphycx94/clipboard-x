name: Release Check

on:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.tag_check.outputs.exists == 'false' }}
      version: ${{ steps.pkg.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.pkg.outputs.version }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.pkg.outputs.version }} already exists, skipping release."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.pkg.outputs.version }} not found, will trigger release."
          fi

  build:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.check.outputs.version }}
    secrets: inherit
    permissions:
      contents: write
